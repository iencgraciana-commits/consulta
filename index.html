<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Consulta Estudiantil</title>
</head>
<body>

<h2>Ingreso al Sistema</h2>

<input type="text" id="documento" placeholder="Documento"><br><br>
<input type="password" id="clave" placeholder="Clave"><br><br>

<button onclick="login()">Ingresar</button>

<div id="resultado"></div>

<script>

let estudiantes = [];
let encabezados = [];

fetch("estudiantes.csv")
    .then(response => response.text())
    .then(data => {

        let filas = data.trim().split(/\r?\n/);

        // Guardar encabezados (separado por TAB)
        encabezados = filas[0].split("\t");

        // Quitar encabezado
        filas.shift();

        filas.forEach(fila => {

            let columnas = fila.split("\t");

            // Crear objeto dinámico con todas las columnas
            let estudiante = {};

            encabezados.forEach((titulo, index) => {
                estudiante[titulo.trim()] = columnas[index]?.trim();
            });

            estudiantes.push(estudiante);
        });
    });

function login() {

    let doc = document.getElementById("documento").value.trim();
    let clave = document.getElementById("clave").value.trim();
    let resultado = document.getElementById("resultado");

    let estudiante = estudiantes.find(e => 
        e["Documento"] === doc && e["Clave"] === clave
    );

    if (estudiante) {

        let tabla = "<h3>Boletín Académico</h3>";
        tabla += "<strong>Estudiante:</strong> " + estudiante["Nombre"] + "<br>";
        tabla += "<strong>Curso:</strong> " + estudiante["Curso"] + "<br><br>";

        tabla += "<table border='1' cellpadding='5'>";
        tabla += "<tr><th>Materia</th><th>Nota</th></tr>";

        // Mostrar desde la columna 4 en adelante (materias)
        for (let i = 4; i < encabezados.length; i++) {

            let materia = encabezados[i];
            let nota = estudiante[materia];

            tabla += "<tr><td>" + materia + "</td><td>" + nota + "</td></tr>";
        }

        tabla += "</table>";

        resultado.innerHTML = tabla;

    } else {
        resultado.innerHTML = "<p style='color:red;'>Documento o clave incorrectos</p>";
    }
}

</script>

</body>
</html>
