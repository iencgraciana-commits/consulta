<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Consulta Académica</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2b5876, #4e4376);
    text-align: center;
    color: white;
    margin: 0;
    padding: 20px;
}

.contenedor {
    background: white;
    color: black;
    max-width: 800px;
    margin: auto;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
}

input {
    padding: 10px;
    width: 250px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    border: none;
    background: #4e4376;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #2b5876;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

th {
    background: #4e4376;
    color: white;
    padding: 8px;
}

td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
}

.baja { background-color: #ffcccc; }
.media { background-color: #fff3cd; }
.alta { background-color: #d4edda; }

.error {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="contenedor">

<h2>Ingreso al Sistema Académico</h2>

<input type="text" id="documento" placeholder="Documento"><br><br>
<input type="password" id="clave" placeholder="Clave"><br><br>

<button onclick="login()">Ingresar</button>

<div id="resultado"></div>

</div>

<script>

let estudiantes = [];
let encabezados = [];

fetch("estudiantes.csv")
    .then(response => response.text())
    .then(data => {

        let filas = data.trim().split(/\r?\n/);
        encabezados = filas[0].split(";").map(e => e.trim());
        filas.shift();

        filas.forEach(fila => {
            let columnas = fila.split(";");
            let estudiante = {};

            encabezados.forEach((titulo, index) => {
                estudiante[titulo] = columnas[index]?.trim();
            });

            estudiantes.push(estudiante);
        });
    });

function login() {

    let doc = document.getElementById("documento").value.trim();
    let clave = document.getElementById("clave").value.trim();
    let resultado = document.getElementById("resultado");

    let estudiante = estudiantes.find(e => 
        e["Documento"] === doc && e["Clave"] === clave
    );

    if (estudiante) {

        let tabla = "<h3>Promedio 1er Período</h3>";
        tabla += "<strong>Estudiante:</strong> " + estudiante["Nombre"] + "<br>";
        tabla += "<strong>Curso:</strong> " + estudiante["Curso"] + "<br><br>";

        tabla += "<table>";
        tabla += "<tr><th>Materia</th><th>Nota</th></tr>";

        for (let i = 4; i < encabezados.length; i++) {

            let materia = encabezados[i];
            let nota = estudiante[materia];

            let clase = "";
            let valor = parseFloat(nota);

            if (!isNaN(valor)) {
                if (valor < 3) clase = "baja";
                else if (valor < 4) clase = "media";
                else clase = "alta";
            }

            tabla += `<tr class="${clase}"><td>${materia}</td><td>${nota || ""}</td></tr>`;
        }

        tabla += "</table>";

        resultado.innerHTML = tabla;

    } else {
        resultado.innerHTML = "<p class='error'>Documento o clave incorrectos</p>";
    }
}

</script>

</body>
</html>
